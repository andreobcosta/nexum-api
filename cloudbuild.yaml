steps:
  # ── STEP 1: Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/nexum-production/nexum-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/nexum-production/nexum-api:latest'
      - '.'

  # ── STEP 2: Push da imagem
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/nexum-production/nexum-api'
    waitFor: ['build']

  # ── STEP 3: Deploy no Cloud Run (--no-traffic — aguarda container iniciar)
  # Se o container falhar ao iniciar, o gcloud retorna erro e o build para aqui.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nexum-api
      - '--image=gcr.io/nexum-production/nexum-api:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--timeout=900'
      - '--set-env-vars=GCP_PROJECT_ID=nexum-production,FIRESTORE_DATABASE_ID=nexum-db,NODE_ENV=production,DEPLOY_SHA=$COMMIT_SHA,APP_URL=https://nexum-api-xvxoj574uq-uc.a.run.app,GOOGLE_REDIRECT_URI=https://nexum-api-xvxoj574uq-uc.a.run.app/api/auth/google/callback'
      - '--set-secrets=ANTHROPIC_API_KEY=nexum-anthropic-key:latest,GOOGLE_CLIENT_ID=nexum-google-client-id:latest,GOOGLE_CLIENT_SECRET=nexum-google-client-secret:latest,GOOGLE_REFRESH_TOKEN=nexum-google-refresh-token:latest,GOOGLE_DRIVE_ROOT_FOLDER_ID=nexum-google-drive-folder-id:latest,/app/secrets/nexum-service-account.json=nexum-service-account:latest,JWT_SECRET=nexum-jwt-secret:latest,ALLOWED_EMAIL=nexum-allowed-email:latest,GOOGLE_LOGIN_CLIENT_ID=nexum-login-client-id:latest,GOOGLE_LOGIN_CLIENT_SECRET=nexum-login-client-secret:latest'
      - '--service-account=nexum-api@nexum-production.iam.gserviceaccount.com'
      - '--no-traffic'
    waitFor: ['push']

  # ── STEP 4: Libera tráfego + health check + rollback automático em um único passo
  # Ordem: libera tráfego → verifica saúde → rollback se falhar
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'release-verify-rollback'
    entrypoint: bash
    args:
      - '-c'
      - |
        SERVICE_URL="https://nexum-api-xvxoj574uq-uc.a.run.app"

        # 1. Libera tráfego para nova revisão
        echo "Liberando tráfego para nova revisão..."
        gcloud run services update-traffic nexum-api \
          --region us-central1 \
          --to-latest
        echo "✓ Tráfego liberado"

        # 2. Aguarda propagação (Cloud Run pode demorar alguns segundos)
        sleep 8

        # 3. Health check (5 tentativas × 10s = até 50s)
        # Aceita 200 (OK) ou 503 (degradado mas container rodando)
        HEALTHY=false
        for i in 1 2 3 4 5; do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "$$SERVICE_URL/api/health" || echo "000")

          echo "Tentativa $$i — HTTP $$HTTP_STATUS"

          if [ "$$HTTP_STATUS" = "200" ] || [ "$$HTTP_STATUS" = "503" ]; then
            HEALTHY=true
            echo "✓ Serviço respondeu com HTTP $$HTTP_STATUS"
            break
          fi

          sleep 10
        done

        # 4. Se saudável, sucesso
        if [ "$$HEALTHY" = "true" ]; then
          echo "✓ Deploy concluído com sucesso!"
          exit 0
        fi

        # 5. Rollback automático se container não respondeu
        echo "✗ Health check falhou após 5 tentativas — executando rollback"
        PREVIOUS=$(gcloud run revisions list \
          --service nexum-api \
          --region us-central1 \
          --format "value(metadata.name)" \
          --sort-by "~metadata.creationTimestamp" \
          --limit 2 | tail -1)

        if [ -n "$$PREVIOUS" ]; then
          gcloud run services update-traffic nexum-api \
            --region us-central1 \
            --to-revisions="$$PREVIOUS=100"
          echo "✓ Rollback concluído para: $$PREVIOUS"
        else
          echo "⚠ Nenhuma revisão anterior disponível para rollback"
        fi
        exit 1
    waitFor: ['deploy']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'
