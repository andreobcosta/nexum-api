steps:
  # ── STEP 1: Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/nexum-production/nexum-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/nexum-production/nexum-api:latest'
      - '.'

  # ── STEP 2: Push da imagem
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/nexum-production/nexum-api'
    waitFor: ['build']

  # ── STEP 3: Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nexum-api
      - '--image=gcr.io/nexum-production/nexum-api:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--timeout=900'
      - '--set-env-vars=GCP_PROJECT_ID=nexum-production,FIRESTORE_DATABASE_ID=nexum-db,NODE_ENV=production,DEPLOY_SHA=$COMMIT_SHA,APP_URL=https://nexum-api-xvxoj574uq-uc.a.run.app,GOOGLE_REDIRECT_URI=https://nexum-api-xvxoj574uq-uc.a.run.app/api/auth/google/callback'
      - '--set-secrets=ANTHROPIC_API_KEY=nexum-anthropic-key:latest,GOOGLE_CLIENT_ID=nexum-google-client-id:latest,GOOGLE_CLIENT_SECRET=nexum-google-client-secret:latest,GOOGLE_REFRESH_TOKEN=nexum-google-refresh-token:latest,GOOGLE_DRIVE_ROOT_FOLDER_ID=nexum-google-drive-folder-id:latest,/app/secrets/nexum-service-account.json=nexum-service-account:latest,JWT_SECRET=nexum-jwt-secret:latest,ALLOWED_EMAIL=nexum-allowed-email:latest,GOOGLE_LOGIN_CLIENT_ID=nexum-login-client-id:latest,GOOGLE_LOGIN_CLIENT_SECRET=nexum-login-client-secret:latest'
      - '--service-account=nexum-api@nexum-production.iam.gserviceaccount.com'
      - '--no-traffic'
    waitFor: ['push']

  # ── STEP 4: Health check da nova revisão (antes de liberar tráfego)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'health-check'
    entrypoint: bash
    args:
      - '-c'
      - |
        REVISION=$(gcloud run revisions list \
          --service nexum-api \
          --region us-central1 \
          --format "value(metadata.name)" \
          --sort-by "~metadata.creationTimestamp" \
          --limit 1)

        REVISION_URL=$(gcloud run revisions describe $$REVISION \
          --region us-central1 \
          --format "value(status.url)" 2>/dev/null || \
          echo "https://nexum-api-618022617938.us-central1.run.app")

        echo "Revisão: $$REVISION"
        echo "Verificando saúde em: $$REVISION_URL/api/health"

        for i in 1 2 3 4 5; do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "https://nexum-api-618022617938.us-central1.run.app/api/health" \
            -H "x-deploy-check: cloudbuild" || echo "000")

          echo "Tentativa $$i — HTTP $$HTTP_STATUS"

          if [ "$$HTTP_STATUS" = "200" ]; then
            echo "✓ Health check passou!"
            exit 0
          fi

          sleep 10
        done

        echo "✗ Health check falhou após 5 tentativas"
        exit 1
    waitFor: ['deploy']

  # ── STEP 5: Libera tráfego para a nova revisão (só se health check passou)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'release-traffic'
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - nexum-api
      - '--region=us-central1'
      - '--to-latest'
    waitFor: ['health-check']

  # ── STEP 6: Rollback automático se algo falhou
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'rollback'
    entrypoint: bash
    args:
      - '-c'
      - |
        PREVIOUS=$(gcloud run revisions list \
          --service nexum-api \
          --region us-central1 \
          --format "value(metadata.name)" \
          --sort-by "~metadata.creationTimestamp" \
          --limit 2 | tail -1)

        if [ -n "$$PREVIOUS" ]; then
          echo "⚠ Rollback para: $$PREVIOUS"
          gcloud run services update-traffic nexum-api \
            --region us-central1 \
            --to-revisions="$$PREVIOUS=100"
          echo "✓ Rollback concluído"
        else
          echo "Nenhuma revisão anterior disponível para rollback"
        fi
    waitFor: ['health-check']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'